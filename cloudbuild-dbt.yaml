steps:
  - name: gcr.io/cloud-builders/bash
    entrypoint: bash
    args:
      - -c
      - |
        cp pyproject.toml dbt/pyproject.toml
        cp uv.lock dbt/uv.lock

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/api-warehouse-dbt:$COMMIT_SHA
      - -f
      - dbt/Dockerfile
      - dbt

images:
  - gcr.io/$PROJECT_ID/api-warehouse-dbt:$COMMIT_SHA
