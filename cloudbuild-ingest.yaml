steps:
  - name: gcr.io/cloud-builders/bash
    entrypoint: bash
    args:
      - -c
      - |
        cp pyproject.toml ingest/pyproject.toml
        cp uv.lock ingest/uv.lock

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/api-warehouse-ingest:$COMMIT_SHA
      - -f
      - ingest/Dockerfile
      - ingest

images:
  - gcr.io/$PROJECT_ID/api-warehouse-ingest:$COMMIT_SHA
