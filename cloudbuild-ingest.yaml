steps:
  # gcr.io/cloud-builders/bash doesn't exist; reuse the docker builder image
  # (needed by the next step anyway) for the shell commands.
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        cp pyproject.toml ingest/pyproject.toml
        cp uv.lock ingest/uv.lock

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/api-warehouse-ingest:$COMMIT_SHA
      - -f
      - ingest/Dockerfile
      - ingest

  # Push before deploying — the `images:` section only pushes after all
  # steps finish, which is too late for the jobs update step below.
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/api-warehouse-ingest:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - ${_JOB_NAME}
      - --region=${_REGION}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/api-warehouse-ingest:$COMMIT_SHA

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/api-warehouse-ingest:$COMMIT_SHA

# Required when the trigger specifies a custom service_account (as ours does
# for 2nd-gen repository triggers) — LEGACY logging is rejected in that case.
options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: us-central1
  _REPOSITORY: api-warehouse
  _JOB_NAME: api-warehouse-ingest
