version: 2

models:
  - name: stg_watched_movies
    description: Cleaned movie watch history with IDs extracted from JSONB
    columns:
      - name: history_id
        description: Trakt history event ID
        data_tests:
          - unique
          - not_null
      - name: watched_at
        description: Datetime the movie was watched — null if Trakt didn't report one, rather than an epoch placeholder
      - name: trakt_movie_id
        description: Trakt movie ID extracted from movie_ids JSONB
        data_tests:
          - not_null
      - name: tmdb_id
        description: TMDB movie ID
      - name: imdb_id
        description: IMDb movie ID
      - name: slug
        description: Trakt URL slug
      - name: title
        description: Movie title
        data_tests:
          - not_null
      - name: year
        description: Movie release year
      - name: runtime_mins
        description: Movie runtime in minutes
      - name: rating
        description: Trakt community rating (0–10)
      - name: votes
        description: Number of Trakt votes
      - name: overview
        description: Movie synopsis
      - name: tagline
        description: Movie tagline
      - name: released_date
        description: Official release date
      - name: genres
        description: JSONB array of genre strings
      - name: country
        description: Country of origin
      - name: language
        description: Primary language
      - name: homepage
        description: Official movie homepage
      - name: trailer
        description: Trailer URL
      - name: status
        description: Release status (e.g. released, in production)
      - name: certification
        description: Age certification (e.g. PG-13, R)

  - name: stg_watched_episodes
    description: Cleaned episode watch history with show and episode metadata
    columns:
      - name: history_id
        description: Trakt history event ID
        data_tests:
          - unique
          - not_null
      - name: watched_at
        description: Datetime the episode was watched — null if Trakt didn't report one, rather than an epoch placeholder
      - name: trakt_show_id
        description: Trakt show ID extracted from show_ids JSONB
        data_tests:
          - not_null
      - name: show_tmdb_id
        description: TMDB show ID
      - name: show_imdb_id
        description: IMDb show ID
      - name: show_slug
        description: Trakt URL slug for the show
      - name: show_title
        description: Show title
        data_tests:
          - not_null
      - name: show_year
        description: Show premiere year
      - name: network
        description: Broadcasting network
      - name: show_status
        description: Show status (e.g. continuing, ended)
      - name: show_rating
        description: Trakt community rating for the show
      - name: show_overview
        description: Show synopsis
      - name: genres
        description: JSONB array of genre strings
      - name: country
        description: Country of origin
      - name: show_runtime_mins
        description: Typical episode runtime in minutes
      - name: show_homepage
        description: Official show homepage
      - name: show_certification
        description: Age certification
      - name: show_first_aired
        description: Show premiere date
      - name: show_aired_episodes
        description: Total number of aired episodes
      - name: show_airs
        description: JSONB with air schedule (day, time, timezone)
      - name: trakt_episode_id
        description: Trakt episode ID
      - name: season
        description: Season number
      - name: episode_number
        description: Episode number within the season
      - name: episode_number_abs
        description: Absolute episode number across all seasons
      - name: episode_title
        description: Episode title
      - name: episode_runtime_mins
        description: Episode runtime in minutes
      - name: episode_rating
        description: Trakt community rating for the episode
      - name: episode_overview
        description: Episode synopsis
      - name: episode_first_aired
        description: Episode air date

  - name: stg_watchlist_movies
    description: Movies saved to the Trakt watchlist
    columns:
      - name: watchlist_id
        description: Trakt watchlist entry ID
        data_tests:
          - unique
          - not_null
      - name: rank
        description: User-defined watchlist rank
      - name: listed_at
        description: Datetime added to watchlist
        data_tests:
          - not_null
      - name: trakt_movie_id
        description: Trakt movie ID
        data_tests:
          - not_null
      - name: tmdb_id
        description: TMDB movie ID
      - name: imdb_id
        description: IMDb movie ID
      - name: slug
        description: Trakt URL slug
      - name: title
        description: Movie title
        data_tests:
          - not_null
      - name: year
        description: Movie release year
      - name: notes
        description: User notes on the watchlist entry

  - name: stg_watchlist_shows
    description: Shows saved to the Trakt watchlist
    columns:
      - name: watchlist_id
        description: Trakt watchlist entry ID
        data_tests:
          - unique
          - not_null
      - name: rank
        description: User-defined watchlist rank
      - name: listed_at
        description: Datetime added to watchlist
        data_tests:
          - not_null
      - name: trakt_show_id
        description: Trakt show ID
        data_tests:
          - not_null
      - name: tmdb_id
        description: TMDB show ID
      - name: imdb_id
        description: IMDb show ID
      - name: slug
        description: Trakt URL slug
      - name: title
        description: Show title
        data_tests:
          - not_null
      - name: year
        description: Show premiere year
      - name: notes
        description: User notes on the watchlist entry

  - name: stg_movie_details
    description: One row per unique movie, sourced from Trakt's per-movie detail endpoint (the only place poster images are available)
    columns:
      - name: trakt_movie_id
        description: Trakt movie ID
        data_tests:
          - unique
          - not_null
      - name: poster_url
        description: URL of the movie's poster image (falls back to clearart, then thumb, if no poster is set)

  - name: stg_show_details
    description: One row per unique show, sourced from Trakt's per-show detail endpoint (the only place poster images are available)
    columns:
      - name: trakt_show_id
        description: Trakt show ID
        data_tests:
          - unique
          - not_null
      - name: poster_url
        description: URL of the show's poster image (falls back to clearart, then thumb, if no poster is set)
