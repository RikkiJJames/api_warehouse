version: 2

models:
  - name: track
    description: Spotify track details sourced from recently played history
    columns:
      - name: track_id
        description: Surrogate primary key
        data_tests:
          - unique
          - not_null
      - name: spotify_track_id
        description: Spotify track ID
        data_tests:
          - unique
          - not_null
      - name: track_name
        description: Track title
        data_tests:
          - not_null
      - name: track_uri
        description: Spotify URI for the track
        data_tests:
          - not_null
      - name: duration_ms
        description: Track duration in milliseconds
        data_tests:
          - not_null
      - name: explicit
        description: Whether the track contains explicit content
        data_tests:
          - accepted_values:
              values: [true, false]
      - name: popularity
        description: Spotify popularity score (0–100)
        data_tests:
          - not_null
      - name: album_id
        description: Spotify album ID — foreign key to album.spotify_album_id
        data_tests:
          - not_null
      - name: artist_id
        description: Spotify artist ID — foreign key to artist.spotify_artist_id
        data_tests:
          - not_null

  - name: artist
    description: Artist details sourced from recently played tracks
    columns:
      - name: artist_id
        description: Surrogate primary key
        data_tests:
          - unique
          - not_null
      - name: spotify_artist_id
        description: Spotify artist ID
        data_tests:
          - unique
          - not_null
      - name: artist_name
        description: Artist name
        data_tests:
          - not_null
      - name: artist_uri
        description: Spotify URI for the artist
        data_tests:
          - not_null

  - name: album
    description: Album details sourced from recently played tracks
    columns:
      - name: album_id
        description: Surrogate primary key
        data_tests:
          - unique
          - not_null
      - name: spotify_album_id
        description: Spotify album ID
        data_tests:
          - unique
          - not_null
      - name: album_name
        description: Album title
        data_tests:
          - not_null
      - name: album_uri
        description: Spotify URI for the album
        data_tests:
          - not_null
      - name: release_date
        description: Album release date
        data_tests:
          - not_null
      - name: total_tracks
        description: Number of tracks on the album
        data_tests:
          - not_null

  - name: stg_recent_tracks
    description: Recently played tracks from the music schema (legacy)
    columns:
      - name: id
        description: Surrogate key
        data_tests:
          - unique
          - not_null
      - name: track_name
        description: Name of the song
      - name: track_uri
        description: Unique identifier for the track
      - name: artist_name
        description: Track main artist
      - name: listened_at
        description: Datetime when the song was listened to
