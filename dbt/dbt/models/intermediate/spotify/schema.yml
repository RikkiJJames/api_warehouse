version: 2

models:
  - name: int_track_enriched
    description: Spotify tracks joined with their artist and album details
    columns:
      - name: track_id
        description: Surrogate key for the track
        data_tests:
          - unique
          - not_null
      - name: spotify_track_id
        description: Spotify track ID
        data_tests:
          - not_null
      - name: track_name
        description: Track title
        data_tests:
          - not_null
      - name: duration_ms
        description: Track duration in milliseconds
        data_tests:
          - not_null
      - name: explicit
        description: Whether the track contains explicit content
        data_tests:
          - accepted_values:
              values: [true, false]
      - name: popularity
        description: Spotify popularity score (0–100)
        data_tests:
          - not_null
      - name: artist_id
        description: Surrogate key for the artist
        data_tests:
          - relationships:
              to: ref('artist')
              field: artist_id
      - name: artist_name
        description: Artist name
      - name: artist_uri
        description: Spotify URI for the artist
      - name: album_id
        description: Surrogate key for the album
        data_tests:
          - relationships:
              to: ref('album')
              field: album_id
      - name: album_name
        description: Album title
      - name: release_date
        description: Album release date
      - name: total_tracks
        description: Number of tracks on the album
      - name: times_played
        description: Number of times the track appears in recently played history
        data_tests:
          - not_null
